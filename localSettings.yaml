defaultIndent: "    "

modifyLineBreaks:
    preserveBlankLines: 1
    condenseMultipleBlankLinesInto: 1
    textWrapOptions:
        columns: 80
        blocksFollow:
            other: |-
                (?x)
                   \\\]
                   |
                   \\item(?:\h|\[)
                   |
                   \\textbf\h*(?:\[\])?\h*\{
                   |
                   \\textit\h*(?:\[\])?\h*\{
